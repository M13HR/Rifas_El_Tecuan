<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos El Chato - Acceso Oficial</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #25d366;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 300px;
        }
        img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #25d366;
        }
        h2 { margin: 10px 0; font-size: 22px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        
        .btn-comprar {
            background-color: #25d366;
            color: black;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }
        
        .footer-note {
            margin-top: 20px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://github.com/fluidicon.png" alt="Logo"> 
        <h2>Sorteo Millonario</h2>
        <p>Toca el botón de abajo para elegir tus números de la suerte.</p>
        
        <a href="https://script.google.com/macros/s/AKfycbwZsyCvON2e57ov4iFFBGw0xOstX_zJ9fFjGotogSWyutnyuMBkbxJ3NqTYxBCJq3pcHQ/exec" class="btn-comprar" target="_blank" rel="noopener noreferrer">
            👉 COMPRAR BOLETOS
        </a>
    </div>

    <p class="footer-note">Si la página no carga, toca los 3 puntos arriba y selecciona "Abrir en navegador".</p>

</body>
</html>
