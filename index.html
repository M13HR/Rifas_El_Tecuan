<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rifas El Tecuan - Acceso Oficial</title>
    <style>
        body {
            background-color: #121212; /* Fondo oscuro premium */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #1e1e1e; /* Color de tarjeta ligeramente más claro */
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #25d366; /* Borde verde neón */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 90%;
            box-sizing: border-box;
        }
        
        /* Contenedor del logo con efecto neón verde */
        .logo-container {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #25d366;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #121212;
            overflow: hidden; /* Asegura que el logo se corte si es cuadrado */
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
        }
        
        .logo-img {
            max-width: 90%;
            max-height: 90%;
            display: block;
        }

        h2 { margin: 10px 0; font-size: 24px; color: #25d366; } /* Nombre en verde */
        p { color: #aaa; font-size: 15px; margin-bottom: 30px; line-height: 1.4; }
        
        .btn-comprar {
            background-color: #25d366;
            color: black;
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 19px;
            display: inline-block;
            transition: 0.3s transform ease, 0.3s box-shadow ease;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.5);
            width: 100%;
            box-sizing: border-box;
        }
        
        .btn-comprar:active {
            transform: scale(0.97); /* Efecto de clic */
            box-shadow: 0 2px 5px rgba(37, 211, 102, 0.5);
        }
        
        .footer-note {
            margin-top: 25px;
            font-size: 11px;
            color: #555;
            position: absolute;
            bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="https://github.com/M13HR/Rifas_El_Tecuan/blob/7b1f8981e152d743950fc9f657211e8b256e0127/tecuan%20png.png" alt="Logo Rifas El Tecuan" class="logo-img">
        </div>
        
        <h2>Rifas El Tecuan</h2>
        <p>Toca el botón de abajo para elegir tus números de la suerte.</p>
        
        <a href="https://script.google.com/macros/s/AKfycbwZsyCvON2e57ov4iFFBGw0xOstX_zJ9fFjGotogSWyutnyuMBkbxJ3NqTYxBCJq3pcHQ/exec" class="btn-comprar">
            👉 COMPRAR BOLETOS
        </a>
    </div>

    <p class="footer-note">Si la página no carga, toca los 3 puntos arriba y selecciona "Abrir en navegador".</p>

</body>
</html>
